<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DriveHub Motors</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="app-layout">

        <aside class="sidebar">
            <div class="sidebar-brand">
                <h1>DriveHub</h1>
                <p>Motors</p>
            </div>

            <nav class="sidebar-nav">
                <a href="index.html" class="active">Home</a>
                <a href="calculator.html">Duty Calculator</a>
                <a href="tracker.html">Port Tracker</a>
                <a href="dashboard.html">Dashboard</a>
                <a href="#">Settings</a>
                <a href="#">Help</a>
            </nav>

            <div class="login-panel">
                <h2>Login</h2>
                <input type="email" id="login-email" placeholder="Email address">
                <input type="password" id="login-password" placeholder="Password">
                <button type="button">Login</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <h2>Find Your Dream Car</h2>
                <p>Import, finance and track vehicles easily with DriveHub Motors.</p>
            </header>

            <section class="cars">
                <div class="car-card">
                    <img src="images/car1.jpg" alt="Toyota Harrier">
                    <h3>Toyota Harrier</h3>
                    <p>KES 2,500,000</p>
                    <button>View Details</button>
                </div>

                <div class="car-card">
                    <img src="images/car2.jpg" alt="Mazda CX5">
                    <h3>Mazda CX5</h3>
                    <p>KES 2,200,000</p>
                    <button>View Details</button>
                </div>
            </section>
        </main>

    </div>

    <script src="js/script.js"></script>

</body>
</html>
